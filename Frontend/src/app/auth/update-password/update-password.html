<div class="auth-page">
  <div class="auth-card">

    <img class="auth-brand" src="/images/logo/subsync-logo.svg" alt="SubSync" style="height: 3rem;" />

    <h1 class="auth-title">Create New Password</h1>
    <p class="auth-subtitle">Your new password must be different from previous used passwords.</p>

    <form (ngSubmit)="onSubmit()" class="auth-form">

      <!-- Password -->
      <div class="field">
        <label class="form-label" for="update-password">NEW PASSWORD</label>
        <div class="field-input-wrap">
          <input
            id="update-password"
            [type]="showPassword() ? 'text' : 'password'"
            class="field-input"
            [class.field-input--error]="passwordError"
            placeholder="••••••••"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            (blur)="passwordTouched.set(true)"
            autocomplete="new-password" />
          <button type="button" class="field-toggle" (click)="togglePassword()">
            <span class="material-symbols-outlined">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
        <span *ngIf="passwordError" class="field-error">{{ passwordError }}</span>
      </div>

      <!-- Confirm Password -->
      <div class="field">
        <label class="form-label" for="update-confirm">CONFIRM NEW PASSWORD</label>
        <div class="field-input-wrap">
          <input
            id="update-confirm"
            [type]="showConfirm() ? 'text' : 'password'"
            class="field-input"
            [class.field-input--error]="confirmError"
            placeholder="••••••••"
            [value]="confirmPassword()"
            (input)="confirmPassword.set($any($event.target).value)"
            (blur)="confirmTouched.set(true)"
            autocomplete="new-password" />
          <button type="button" class="field-toggle" (click)="toggleConfirm()">
            <span class="material-symbols-outlined">{{ showConfirm() ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
        <span *ngIf="confirmError" class="field-error">{{ confirmError }}</span>
      </div>

      <!-- Success -->
      <div *ngIf="successMessage()" class="auth-success" style="margin-top: 0.5rem">
        <span class="material-symbols-outlined">check_circle</span>
        {{ successMessage() }}
      </div>

      <!-- Error -->
      <div *ngIf="errorMessage()" class="auth-error" style="margin-top: 0.5rem">
        <span class="material-symbols-outlined">error</span>
        {{ errorMessage() }}
      </div>

      <!-- Submit -->
      <button type="submit" class="auth-btn-primary" [disabled]="isLoading() || successMessage()">
        <span *ngIf="isLoading()" class="spinner"></span>
        <span *ngIf="!isLoading()">Reset Password</span>
      </button>

      <!-- Footer -->
      <p class="auth-footer" style="margin-top: 1.5rem">
        <a routerLink="/login" class="auth-footer-link">&larr; Back to login</a>
      </p>

    </form>
  </div>
</div>
