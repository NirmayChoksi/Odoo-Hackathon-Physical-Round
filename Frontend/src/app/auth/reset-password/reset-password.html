<div class="auth-page">
  <div class="auth-card">

    <img class="auth-brand" src="/images/logo/subsync-logo.svg" alt="SubSync" style="height: 3rem;" />

    <h1 class="auth-title">Password Reset</h1>
    <p class="auth-subtitle">Enter your registered email and we'll send you a reset link.</p>

    <form (ngSubmit)="onSubmit()" class="auth-form">

      <!-- Email -->
      <div class="field">
        <label class="form-label" for="reset-email">REGISTERED EMAIL</label>
        <div class="field-input-wrap">
          <input
            id="reset-email"
            type="email"
            class="field-input"
            placeholder="architect@subsync.io"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            autocomplete="email" />
        </div>
      </div>

      <!-- Note -->
      <!-- <div class="auth-note">
        <p>The system will verify whether the entered email exists before sending.</p>
      </div> -->

      <!-- Success -->
      <div *ngIf="successMessage()" class="auth-success">
        <span class="material-symbols-outlined">check_circle</span>
        {{ successMessage() }}
      </div>

      <!-- Error -->
      <div *ngIf="errorMessage()" class="auth-error">
        <span class="material-symbols-outlined">error</span>
        {{ errorMessage() }}
      </div>

      <!-- Submit -->
      <button type="submit" class="auth-btn-primary" [disabled]="isLoading()">
        <span *ngIf="isLoading()" class="spinner"></span>
        <span *ngIf="!isLoading()">Send Reset Link</span>
      </button>

      <!-- Footer -->
      <p class="auth-footer">
        <a routerLink="/login" class="auth-footer-link">&larr; Return to Sign In</a>
      </p>
    </form>
  </div>
</div>
