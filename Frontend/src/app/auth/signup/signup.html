<div class="auth-page">
  <div class="auth-card">

    <img class="auth-brand" src="/images/logo/subsync-logo.svg" alt="SubSync" style="height: 3rem;" />

    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Join the platform as a new portal user.</p>

    <form (ngSubmit)="onSubmit()" class="auth-form">

      <!-- Name -->
      <div class="field">
        <label class="form-label" for="signup-name">FULL NAME</label>
        <div class="field-input-wrap">
          <input
            id="signup-name"
            type="text"
            class="field-input"
            [class.field-input--error]="nameError"
            placeholder="John Doe"
            [value]="name()"
            (input)="name.set($any($event.target).value)"
            (blur)="nameTouched.set(true)"
            autocomplete="name" />
        </div>
        <span *ngIf="nameError" class="field-error">{{ nameError }}</span>
      </div>

      <!-- Email -->
      <div class="field">
        <label class="form-label" for="signup-email">EMAIL ADDRESS</label>
        <div class="field-input-wrap">
          <input
            id="signup-email"
            type="email"
            class="field-input"
            [class.field-input--error]="emailError"
            placeholder="architect@subsync.io"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            (blur)="emailTouched.set(true)"
            autocomplete="email" />
        </div>
        <span *ngIf="emailError" class="field-error">{{ emailError }}</span>
      </div>

      <!-- Password -->
      <div class="field">
        <label class="form-label" for="signup-password">PASSWORD</label>
        <div class="field-input-wrap">
          <input
            id="signup-password"
            [type]="showPassword() ? 'text' : 'password'"
            class="field-input"
            [class.field-input--error]="passwordError"
            placeholder="••••••••"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            (blur)="passwordTouched.set(true)"
            autocomplete="new-password" />
          <button type="button" class="field-toggle" (click)="togglePassword()">
            <span class="material-symbols-outlined">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
        <span *ngIf="passwordError" class="field-error">{{ passwordError }}</span>
      </div>

      <!-- Confirm Password -->
      <div class="field">
        <label class="form-label" for="signup-confirm">CONFIRM PASSWORD</label>
        <div class="field-input-wrap">
          <input
            id="signup-confirm"
            [type]="showConfirm() ? 'text' : 'password'"
            class="field-input"
            [class.field-input--error]="confirmError"
            placeholder="••••••••"
            [value]="confirmPassword()"
            (input)="confirmPassword.set($any($event.target).value)"
            (blur)="confirmTouched.set(true)"
            autocomplete="new-password" />
          <button type="button" class="field-toggle" (click)="toggleConfirm()">
            <span class="material-symbols-outlined">{{ showConfirm() ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
        <span *ngIf="confirmError" class="field-error">{{ confirmError }}</span>
      </div>

      <!-- Error -->
      <div *ngIf="errorMessage()" class="auth-error">
        <span class="material-symbols-outlined">error</span>
        {{ errorMessage() }}
      </div>

      <!-- Submit -->
      <button type="submit" class="auth-btn-primary" [disabled]="isLoading()">
        <span *ngIf="isLoading()" class="spinner"></span>
        <span *ngIf="!isLoading()">Create Account</span>
      </button>

      <!-- Divider -->
      <!-- <div class="auth-divider">
        <span>OR CONTINUE WITH</span>
      </div> -->

      <!-- Google -->
      <!-- <div class="auth-social-row">
        <button type="button" class="auth-btn-outline" (click)="onGoogleSignup()">
          <span class="material-symbols-outlined">public</span>
          Google
        </button>
      </div> -->

      <!-- Footer -->
      <p class="auth-footer">
        Already have an account?
        <a routerLink="/login" class="auth-footer-link">Sign In</a>
      </p>
    </form>
  </div>
</div>
