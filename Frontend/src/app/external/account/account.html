<app-external-navbar></app-external-navbar>

<main class="page-container">
  
  <div class="account-card">
    <div class="account__header">
      <h1 class="account__title">Account Settings</h1>
      <div class="account__tabs">
        <button class="account__tab account__tab--active">User Details</button>
        <button class="account__tab">My Orders</button>
      </div>
    </div>

    <div class="account__content">
      <div class="account__sidebar">
        @if (!isEditing()) {
          <app-button variant="secondary" [fullWidth]="true" label="Edit Profile" icon="edit" (click)="toggleEdit()"></app-button>
        } @else {
          <app-button variant="primary" [fullWidth]="true" label="Save Changes" icon="save" (click)="save()"></app-button>
          <div style="margin-top: 12px">
            <app-button variant="ghost" [fullWidth]="true" label="Cancel" (click)="toggleEdit()"></app-button>
          </div>
        }
      </div>

      <div class="account__main">
        @if (!isEditing()) {
          <div class="profile-view">
            <div class="profile-group">
              <label>User Name</label>
              <p>{{ user().name }}</p>
            </div>
            <div class="profile-group">
              <label>Email</label>
              <p>{{ user().email }}</p>
            </div>
            <div class="profile-group">
              <label>Phone Number</label>
              <p>{{ user().phone }}</p>
            </div>
            <div class="profile-group">
              <label>Address</label>
              <p>{{ user().address }}</p>
            </div>
            <div class="profile-group">
              <label>Bio / Other Details</label>
              <p class="text-italic">{{ user().otherDetails }}</p>
            </div>
          </div>
        } @else {
          <div class="profile-edit">
            <div class="edit-row">
              <app-input label="User Name" [value]="editBuffer.name" (valueChange)="updateField('name', $event)"></app-input>
              <app-input label="Email" type="email" [value]="editBuffer.email" (valueChange)="updateField('email', $event)"></app-input>
            </div>
            <app-input label="Phone Number" [value]="editBuffer.phone" (valueChange)="updateField('phone', $event)"></app-input>
            <app-input label="Address" [value]="editBuffer.address" (valueChange)="updateField('address', $event)"></app-input>
            <app-input label="Other Details" [value]="editBuffer.otherDetails" (valueChange)="updateField('otherDetails', $event)"></app-input>
          </div>
        }
      </div>
    </div>
  </div>

</main>
