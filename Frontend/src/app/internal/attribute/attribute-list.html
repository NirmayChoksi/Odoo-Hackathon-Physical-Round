<div class="internal-container">

  <!-- Navigation Header -->
  <nav class="internal-nav">
    <div class="nav-brand">
      <img src="/images/logo/subsync-logo.svg" alt="SubSync" class="brand-logo" />
    </div>
    <div class="nav-links">
      @for(item of navItems(); track item.label) {
        @if(item.isDropdown) {
          <div class="nav-dropdown" [class.nav-dropdown--open]="isConfigOpen()">
            <button type="button" class="nav-link nav-dropdown-btn" [class.nav-link--active]="item.active" (click)="toggleConfig($event)">
              {{ item.label }}
              <span class="material-symbols-outlined dropdown-icon">arrow_drop_down</span>
            </button>
            <div class="nav-dropdown-content" (click)="$event.stopPropagation()">
              @for(sub of item.dropdownItems; track sub.label) {
                <a [routerLink]="sub.path" class="dropdown-item">
                  {{ sub.label }}
                </a>
              }
            </div>
          </div>
        } @else {
          <a [routerLink]="item.path" class="nav-link" [class.nav-link--active]="item.active" (click)="onNavClick(item)">
            {{ item.label }}
          </a>
        }
      }
    </div>
    <div class="nav-profile">
      <a routerLink="/login" class="profile-btn">
        <span class="material-symbols-outlined">person</span>
        My Profile
      </a>
    </div>
  </nav>

  <!-- Main Content Body -->
  <main class="internal-content">

    <!-- Action Bar -->
    <div class="action-bar">
      <div class="action-left">
        <button class="btn-new" routerLink="/attribute/new">
          <span class="material-symbols-outlined">add</span>
          New
        </button>
        <div class="action-icons">
          <button class="icon-btn" title="Delete">
            <span class="material-symbols-outlined">delete</span>
          </button>
          <button class="icon-btn" title="Save">
            <span class="material-symbols-outlined">save</span>
          </button>
        </div>
      </div>
      <div class="action-right">
        <div class="search-bar">
          <span class="material-symbols-outlined search-icon">search</span>
          <input 
            type="text" 
            placeholder="search bar" 
            class="search-input"
            [ngModel]="searchQuery()"
            (ngModelChange)="searchQuery.set($event)" />
        </div>
      </div>
    </div>

    <!-- Attribute List Table -->
    <div class="table-wrapper">
      <table class="list-table">
        <thead>
          <tr>
            <th class="checkbox-cell"><input type="checkbox" /></th>
            <th class="table-header">Name</th>
            <th class="table-header">Values</th>
          </tr>
        </thead>
        <tbody>
          @for(attr of attributes(); track attr.id) {
            <tr [routerLink]="['/attribute', attr.id]">
              <td class="checkbox-cell"><input type="checkbox" (click)="$event.stopPropagation()" /></td>
              <td class="accent-text">{{ attr.name }}</td>
              <td>{{ attr.values }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>

  </main>
</div>
