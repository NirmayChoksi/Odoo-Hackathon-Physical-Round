<div class="internal-container">

  <!-- Navigation Header -->
  <nav class="internal-nav">
    <div class="nav-brand">
      <img src="/images/logo/subsync-logo.svg" alt="SubSync" class="brand-logo" />
    </div>
    <div class="nav-links">
      @for(item of navItems(); track item.label) {
        @if(item.isDropdown) {
          <div class="nav-dropdown" [class.nav-dropdown--open]="isConfigOpen()">
            <button type="button" class="nav-link nav-dropdown-btn" [class.nav-link--active]="item.active" (click)="toggleConfig($event)">
              {{ item.label }}
              <span class="material-symbols-outlined dropdown-icon">arrow_drop_down</span>
            </button>
            <div class="nav-dropdown-content" (click)="$event.stopPropagation()">
              @for(sub of item.dropdownItems; track sub.label) {
                <a
                  [routerLink]="sub.path"
                  class="dropdown-item"
                  routerLinkActive="dropdown-item--current"
                  [routerLinkActiveOptions]="{ exact: sub.exactActive }">
                  {{ sub.label }}
                </a>
              }
            </div>
          </div>
        } @else {
          <a [routerLink]="item.path" class="nav-link" [class.nav-link--active]="item.active" (click)="onNavClick(item)">
            {{ item.label }}
          </a>
        }
      }
    </div>
    <div class="nav-profile">
      <a routerLink="/login" class="profile-btn">
        <span class="material-symbols-outlined">person</span>
        My Profile
      </a>
    </div>
  </nav>

  <!-- Main Content Body -->
  <main class="internal-content">

    <!-- Action Bar -->
    <div class="action-bar">
      <div class="action-left">
        <button class="btn-new" (click)="onNew()">
          New
        </button>
        <div class="action-icons">
          <button class="icon-btn" (click)="onDelete()" title="Delete">
            <span class="material-symbols-outlined">delete</span>
          </button>
          <button class="icon-btn" (click)="onSave()" title="Save">
            <span class="material-symbols-outlined">save</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Attribute Form Container -->
    <div class="form-container">

      <!-- Attribute Name — large editable title -->
      <div class="title-group">
        <input
          type="text"
          id="attributeName"
          class="title-input"
          placeholder="Attribute Name"
          [ngModel]="attributeName()"
          (ngModelChange)="attributeName.set($event)" />
      </div>

      <!-- Values Table Section -->
      <div class="values-section">
        <div class="section-label-container">
          <span class="section-label">Attribute Values</span>
        </div>
        
        <div class="table-wrapper">
          <table class="values-table">
            <thead>
              <tr>
                <th class="table-header">Value</th>
                <th class="table-header">Default Extra Price</th>
              </tr>
            </thead>
            <tbody>
              @for(row of attributeValues(); track $index) {
                <tr>
                  <td><input type="text" [(ngModel)]="row.value" placeholder="e.g. odoo" class="table-input" /></td>
                  <td><input type="text" [(ngModel)]="row.extraPrice" placeholder="e.g. 20 R.s" class="table-input" /></td>
                </tr>
              }
            </tbody>
          </table>
        </div>
        <button class="add-row-btn" (click)="addValueRow()">+ Add Value</button>
      </div>

    </div>

  </main>
</div>
