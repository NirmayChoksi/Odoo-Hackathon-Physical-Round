<main class="internal-content">

    <!-- Action Bar -->
    <div class="action-bar">
      <div class="action-left">
        <button class="btn-new" (click)="onNew()">
          <span class="material-symbols-outlined">add</span>
          New
        </button>
        <div class="action-icons">
          <button class="icon-btn" (click)="onDelete()" title="Delete">
            <span class="material-symbols-outlined">delete</span>
          </button>
          <button class="icon-btn" (click)="onSave()" title="Save">
            <span class="material-symbols-outlined">save</span>
          </button>
        </div>
        <button class="btn-subscription" (click)="onSubscriptionClick()">
           Subscription
        </button>
      </div>
    </div>

    <!-- Recurring Plan Form Container -->
    <div class="form-container">

      <!-- Recurring Name — large editable title -->
      <div class="title-group">
        <input
          type="text"
          id="planName"
          class="title-input"
          placeholder="Recurring Name"
          [ngModel]="planName()"
          (ngModelChange)="planName.set($event)" />
      </div>

      <!-- Fields Section -->
      <div class="form-layout">

        <!-- Billing Period Row -->
        <div class="row-group">
          <label class="form-label" for="billingValue">Billing Period</label>
          <div class="dual-input">
            <input
              type="number"
              id="billingValue"
              class="text-input"
              [ngModel]="billingValue()"
              (ngModelChange)="billingValue.set($event)"
              placeholder="" />
            <select
              id="billingUnit"
              class="type-select"
              [value]="billingUnit()"
              (change)="billingUnit.set($any($event.target).value)">
              @for(unit of units; track unit) {
                <option [value]="unit">{{ unit }}</option>
              }
            </select>
          </div>
        </div>

        <!-- Automatic Close Row -->
        <div class="row-group">
          <label class="form-label" for="autoCloseDays">Automatic Close.</label>
          <div class="unit-group">
            <input
              type="number"
              id="autoCloseDays"
              class="text-input"
              [ngModel]="autoCloseDays()"
              (ngModelChange)="autoCloseDays.set($event)"
              placeholder="" />
            <span class="unit-label">Days</span>
          </div>
        </div>

        <!-- Checkbox Flags -->
        <div class="flags-section">
          <div class="checkbox-row">
            <label class="checkbox-container">
              <input type="checkbox" [ngModel]="closable()" (ngModelChange)="closable.set($event)" />
              Closable
            </label>
          </div>
          <div class="checkbox-row">
            <label class="checkbox-container">
              <input type="checkbox" [ngModel]="pausable()" (ngModelChange)="pausable.set($event)" />
              Pausable
            </label>
          </div>
          <div class="checkbox-row">
            <label class="checkbox-container">
              <input type="checkbox" [ngModel]="renew()" (ngModelChange)="renew.set($event)" />
              Renew
            </label>
          </div>
        </div>

        <!-- Product Table -->
        <div class="data-container">
           <table class="products-table">
              <thead>
                <tr>
                  <th class="table-header">Product</th>
                  <th class="table-header">Variant</th>
                  <th class="table-header">Price</th>
                  <th class="table-header">Min Qty.</th>
                </tr>
              </thead>
              <tbody>
                @for(row of products(); track $index) {
                  <tr>
                    <td><input type="text" [(ngModel)]="row.product" placeholder="demo" class="table-input" /></td>
                    <td><input type="text" [(ngModel)]="row.variant" placeholder="" class="table-input" /></td>
                    <td><input type="text" [(ngModel)]="row.price" placeholder="eg. 4 rs per week" class="table-input" /></td>
                    <td><input type="text" [(ngModel)]="row.minQty" placeholder="1 qty" class="table-input" /></td>
                  </tr>
                }
              </tbody>
           </table>
        </div>
        <button type="button" class="add-row-btn" (click)="addProductRow()">+ Add Product</button>
      </div>

    </div>

  </main>
