<main class="internal-content">
    
    <!-- Action Bar -->
    <div class="action-bar">
      <div class="action-left">
        <button type="button" class="btn-new" (click)="onNew()">
          New
        </button>
        <div class="action-icons">
          <button type="button" class="icon-btn" (click)="onDelete()" title="Delete">
            <span class="material-symbols-outlined">delete</span>
          </button>
          <button type="button" class="icon-btn" (click)="onSave()" title="Save">
            <span class="material-symbols-outlined">save</span>
          </button>
        </div>
      </div>
      <div class="action-right">
        <div class="search-bar">
          <span class="material-symbols-outlined search-icon" aria-hidden="true">search</span>
          <input type="text" class="search-input" placeholder="Search quotation templates..." />
        </div>
      </div>
    </div>

    <!-- Quotation Template Form Container -->
    <div class="form-container">
      <div class="title-group">
        <input type="text" class="title-input" placeholder="Template Name" [ngModel]="templateName()" (ngModelChange)="templateName.set($event)" />
      </div>
      
      <div class="form-content">
        <div class="form-group row-group">
          <label class="form-label" for="validity">Quotation validity:-</label>
          <div class="input-with-suffix">
            <input type="number" id="validity" class="form-input num-input" [ngModel]="validityDays()" (ngModelChange)="validityDays.set($event)" />
            <span class="suffix">days</span>
          </div>
        </div>

        <div class="form-group row-group">
          <label class="form-label" for="plan">Recurring Plan:-</label>
          <input type="text" id="plan" class="form-input text-input" [ngModel]="recurringPlanId()" (ngModelChange)="recurringPlanId.set($event)" />
        </div>

        <div class="form-group row-group">
          <label class="form-label" for="lastForever">Last Forever:-</label>
          <input type="checkbox" id="lastForever" class="form-checkbox" [checked]="lastForever()" (change)="lastForever.set($any($event.target).checked)" />
        </div>

        <div class="form-group row-group">
          <label class="form-label" for="endAfterAmount">End After:-</label>
          <div class="input-with-select">
            <input type="number" id="endAfterAmount" class="form-input num-input" [ngModel]="endAfterAmount()" (ngModelChange)="endAfterAmount.set($event)" [disabled]="lastForever()" />
            <div class="select-wrapper">
              <select class="form-select" [value]="endAfterUnit()" (change)="endAfterUnit.set($any($event.target).value)" [disabled]="lastForever()">
                @for(unit of timeUnits; track unit) {
                  <option [value]="unit">{{ unit }}</option>
                }
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Products Table -->
      <div class="data-container">
        <table class="data-table">
          <thead>
            <tr>
              <th class="table-header">Product</th>
              <th class="table-header">Description</th>
              <th class="table-header">Quantity</th>
            </tr>
          </thead>
          <tbody>
            @for(item of products(); track item.id) {
              <tr class="data-row">
                <td class="col-product">{{ item.product }}</td>
                <td>{{ item.description }}</td>
                <td>{{ item.quantity }} qty</td>
              </tr>
            }
          </tbody>
        </table>
        
        @if(products().length === 0) {
          <div class="empty-state">
             <span class="material-symbols-outlined emoji">inventory_2</span>
             <p>No products added</p>
          </div>
        }
      </div>

      <div class="form-footer">
      </div>

    </div>

  </main>
