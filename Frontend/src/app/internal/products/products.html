<div class="internal-container">

  <!-- Navigation Header -->
  <nav class="internal-nav">
    <div class="nav-brand">
      <img src="/images/logo/subsync-logo.svg" alt="SubSync" class="brand-logo" />
    </div>
    <div class="nav-links">
      @for(item of navItems(); track item.label) {
        @if(item.isDropdown) {
          <div class="nav-dropdown" [class.nav-dropdown--open]="navDropdownOpenKey() === item.label">
            <button type="button" class="nav-link nav-dropdown-btn" [class.nav-link--active]="item.active" (click)="toggleNavDropdown($event, item.label)">
              {{ item.label }}
              <span class="material-symbols-outlined dropdown-icon">arrow_drop_down</span>
            </button>
            <div class="nav-dropdown-content" (click)="$event.stopPropagation()">
              @for(sub of item.dropdownItems; track sub.label) {
                <a
                  [routerLink]="sub.path"
                  class="dropdown-item"
                  routerLinkActive="dropdown-item--current"
                  [routerLinkActiveOptions]="{ exact: sub.exactActive }">
                  {{ sub.label }}
                </a>
              }
            </div>
          </div>
        } @else {
          <a [routerLink]="item.path" class="nav-link" [class.nav-link--active]="item.active" (click)="onNavClick(item)">
            {{ item.label }}
          </a>
        }
      }
    </div>
    <div class="nav-profile">
      <a routerLink="/login" class="profile-btn">
        <span class="material-symbols-outlined">person</span>
        My Profile
      </a>
    </div>
  </nav>

  <!-- Main Content Body -->
  <main class="internal-content">

    <!-- Action Bar -->
    <div class="action-bar">
      <div class="action-left">
        <button class="btn-new" (click)="onNew()">
          <span class="material-symbols-outlined">add</span>
          New
        </button>
        <div class="action-icons">
          <button class="icon-btn" (click)="onDelete()" title="Delete">
            <span class="material-symbols-outlined">delete</span>
          </button>
          <button class="icon-btn" (click)="onSave()" title="Save">
            <span class="material-symbols-outlined">save</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Product Form Container -->
    <div class="form-container">

      <!-- Product Name — large editable title -->
      <div class="title-group">
        <input
          type="text"
          id="productName"
          class="title-input"
          placeholder="Product Name"
          [ngModel]="productName()"
          (ngModelChange)="productName.set($event)" />
      </div>

      <!-- Fields Section -->
      <div class="fields-section">

        <!-- Product Type -->
        <div class="field-row">
          <label class="field-label" for="productType">Product Type</label>
          <select
            id="productType"
            class="unit-select"
            [value]="productType()"
            (change)="productType.set($any($event.target).value)">
            @for(type of types; track type) {
              <option [value]="type">{{ type }}</option>
            }
          </select>
        </div>

        <!-- Sales Price -->
        <div class="field-row">
          <label class="field-label" for="salesPrice">Sales Price</label>
          <input
            type="number"
            id="salesPrice"
            class="short-input"
            [ngModel]="salesPrice()"
            (ngModelChange)="salesPrice.set($event)"
            placeholder="0.00" />
        </div>

        <!-- Cost Price -->
        <div class="field-row">
          <label class="field-label" for="costPrice">Cost Price</label>
          <input
            type="number"
            id="costPrice"
            class="short-input"
            [ngModel]="costPrice()"
            (ngModelChange)="costPrice.set($event)"
            placeholder="0.00" />
        </div>

        <!-- Short Description -->
        <div class="field-row field-row--full">
          <label class="field-label" for="shortDescription">Short Description</label>
          <input
            type="text"
            id="shortDescription"
            class="short-input"
            style="width: 100%; max-width: 800px;"
            [ngModel]="shortDescription()"
            (ngModelChange)="shortDescription.set($event)"
            placeholder="Brief summary" />
        </div>

        <!-- Description -->
        <div class="field-row field-row--full">
          <label class="field-label" for="description">Description</label>
          <textarea
            id="description"
            class="short-input"
            style="width: 100%; max-width: 800px; resize: vertical; min-height: 80px;"
            [ngModel]="description()"
            (ngModelChange)="description.set($event)"
            placeholder="Detailed description..."></textarea>
        </div>

        <!-- Terms and Conditions -->
        <div class="field-row field-row--full">
          <label class="field-label" for="termsAndConditions">Terms of Service</label>
          <textarea
            id="termsAndConditions"
            class="short-input"
            style="width: 100%; max-width: 800px; resize: vertical; min-height: 80px;"
            [ngModel]="termsAndConditions()"
            (ngModelChange)="termsAndConditions.set($event)"
            placeholder="Usage terms..."></textarea>
        </div>

        <!-- Image URLs -->
        <div class="field-row field-row--full">
          <label class="field-label" for="imageUrls">Image URLs</label>
          <input
            type="text"
            id="imageUrls"
            class="short-input"
            style="width: 100%; max-width: 800px;"
            [ngModel]="imageUrls()"
            (ngModelChange)="imageUrls.set($event)"
            placeholder="https://... (comma separated)" />
        </div>

        <!-- Is Recurring -->
        <div class="field-row">
          <label class="field-label" for="isRecurring">Recurring Product</label>
          <input
            type="checkbox"
            id="isRecurring"
            class="is-recurring-checkbox"
            [ngModel]="isRecurring()"
            (ngModelChange)="isRecurring.set($event)" />
        </div>

        <!-- Status -->
        <div class="field-row">
          <label class="field-label" for="status">Status</label>
          <select
            id="status"
            class="unit-select"
            [value]="status()"
            (change)="status.set($any($event.target).value)">
            <option value="ACTIVE">Active</option>
            <option value="INACTIVE">Inactive</option>
          </select>
        </div>

      </div>

    </div>

  </main>
</div>
