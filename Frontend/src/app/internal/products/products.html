<div class="internal-container">

  <!-- Navigation Header -->
  <nav class="internal-nav">
    <div class="nav-brand">
      <img src="/images/logo/subsync-logo.svg" alt="SubSync" class="brand-logo" />
    </div>
    <div class="nav-links">
      @for(item of navItems(); track item.label) {
        @if(item.isDropdown) {
          <div class="nav-dropdown" [class.nav-dropdown--open]="isConfigOpen()">
            <button type="button" class="nav-link nav-dropdown-btn" [class.nav-link--active]="item.active" (click)="toggleConfig($event)">
              {{ item.label }}
              <span class="material-symbols-outlined dropdown-icon">arrow_drop_down</span>
            </button>
            <div class="nav-dropdown-content" (click)="$event.stopPropagation()">
              @for(sub of item.dropdownItems; track sub.label) {
                <a [routerLink]="sub.path" class="dropdown-item">
                  {{ sub.label }}
                </a>
              }
            </div>
          </div>
        } @else {
          <a [routerLink]="item.path" class="nav-link" [class.nav-link--active]="item.active" (click)="onNavClick(item)">
            {{ item.label }}
          </a>
        }
      }
    </div>
    <div class="nav-profile">
      <a routerLink="/login" class="profile-btn">
        <span class="material-symbols-outlined">person</span>
        My Profile
      </a>
    </div>
  </nav>

  <!-- Main Content Body -->
  <main class="internal-content">

    <!-- Action Bar -->
    <div class="action-bar">
      <div class="action-left">
        <button class="btn-new" (click)="onNew()">
          <span class="material-symbols-outlined">add</span>
          New
        </button>
        <div class="action-icons">
          <button class="icon-btn" (click)="onDelete()" title="Delete">
            <span class="material-symbols-outlined">delete</span>
          </button>
          <button class="icon-btn" (click)="onSave()" title="Save">
            <span class="material-symbols-outlined">save</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Product Form Container -->
    <div class="form-container">

      <!-- Product Name — large editable title -->
      <div class="title-group">
        <input
          type="text"
          id="productName"
          class="title-input"
          placeholder="Product Name"
          [ngModel]="productName()"
          (ngModelChange)="productName.set($event)" />
      </div>

      <!-- Fields Section -->
      <div class="fields-section">

        <!-- Sales Price -->
        <div class="field-row">
          <label class="field-label" for="salesPrice">Sales Price</label>
          <input
            type="number"
            id="salesPrice"
            class="short-input"
            [ngModel]="salesPrice()"
            (ngModelChange)="salesPrice.set($event)"
            placeholder="0.00" />
        </div>

        <!-- Category -->
        <div class="field-row">
          <label class="field-label" for="category">Product Category</label>
          <select
            id="category"
            class="unit-select"
            [value]="category()"
            (change)="category.set($any($event.target).value)">
            @for(cat of categories; track cat) {
              <option [value]="cat">{{ cat }}</option>
            }
          </select>
        </div>

        <!-- Internal Reference -->
        <div class="field-row">
          <label class="field-label" for="internalReference">Internal Reference</label>
          <input
            type="text"
            id="internalReference"
            class="short-input"
            [ngModel]="internalReference()"
            (ngModelChange)="internalReference.set($event)"
            placeholder="e.g. FURN_001" />
        </div>

      </div>

    </div>

  </main>
</div>
