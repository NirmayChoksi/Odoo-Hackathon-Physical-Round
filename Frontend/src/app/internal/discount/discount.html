<div class="internal-container">
  
  <!-- Navigation Header -->
  <nav class="internal-nav">
    <div class="nav-brand">
      <img src="/images/logo/subsync-logo.svg" alt="SubSync" class="brand-logo" />
    </div>
    <div class="nav-links">
      @for(item of navItems(); track item.label) {
        <a href="#" class="nav-link" [class.nav-link--active]="item.active" (click)="onNavClick(item); $event.preventDefault()">
          {{ item.label }}
        </a>
      }
    </div>
    <div class="nav-profile">
      <a routerLink="/login" class="profile-btn">
        <span class="material-symbols-outlined">person</span>
        My Profile
      </a>
    </div>
  </nav>

  <!-- Main Content Body -->
  <main class="internal-content">
    
    <!-- Action Bar -->
    <div class="action-bar">
      <div class="action-left">
        <button class="btn-new" (click)="onNew()">
          <span class="material-symbols-outlined">add</span>
          New
        </button>
        <div class="action-icons">
          <button class="icon-btn" (click)="onDelete()" title="Delete">
            <span class="material-symbols-outlined">delete</span>
          </button>
          <button class="icon-btn" (click)="onSave()" title="Save">
            <span class="material-symbols-outlined">save</span>
          </button>
        </div>
      </div>
      <div class="action-right">
      </div>
    </div>

    <!-- Discount Form Container -->
    <div class="form-container">
      
      <div class="form-header-input-group">
        <input type="text" class="form-title-input" placeholder="Discount Name" [(ngModel)]="discountName" />
      </div>
      
      <div class="form-layout">
        <!-- Left Column -->
        <div class="form-column">
          <div class="form-group row-group">
            <label class="form-label" for="discountType">Fixed Price/ percentage</label>
            <div class="select-wrapper type-select">
              <select id="discountType" class="form-select type-select" [value]="discountType()" (change)="discountType.set($any($event.target).value)">
                @for(type of discountTypes; track type) {
                  <option [value]="type">{{ type }}</option>
                }
              </select>
            </div>
          </div>

          <div class="form-group row-group">
            <label class="form-label" for="minPurchase">Minimum purchase</label>
            <input type="number" id="minPurchase" class="form-input text-input" [(ngModel)]="minimumPurchase" />
          </div>

          <div class="form-group row-group">
            <label class="form-label" for="minQuantity">Minimum quantity</label>
            <input type="number" id="minQuantity" class="form-input text-input" [(ngModel)]="minimumQuantity" />
          </div>

          <div class="form-group row-group">
            <label class="form-label" for="products">Products</label>
            <input type="text" id="products" class="form-input text-input" [(ngModel)]="products" />
          </div>
        </div>

        <!-- Right Column -->
        <div class="form-column">
          <div class="form-group row-group">
            <label class="form-label" for="startDate">Start Date</label>
            <input type="date" id="startDate" class="form-input text-input date-input" [(ngModel)]="startDate" />
          </div>

          <div class="form-group row-group">
            <label class="form-label" for="endDate">End Date</label>
            <input type="date" id="endDate" class="form-input text-input date-input" [(ngModel)]="endDate" />
          </div>

          <div class="form-group row-group limit-usage-group">
            <label class="form-label" for="limitUsage">Limit usage</label>
            <input type="checkbox" id="limitUsage" class="form-checkbox" [checked]="limitUsage()" (change)="limitUsage.set($any($event.target).checked)" />
            
            @if(limitUsage()) {
              <div class="limit-count-wrapper">
                <input type="number" class="form-input num-input inline-num" placeholder="Count" [(ngModel)]="limitUsageCount" />
              </div>
            }
          </div>
        </div>
      </div>
    </div>

  </main>
</div>
