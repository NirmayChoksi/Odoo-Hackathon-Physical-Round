<main class="internal-content">
    
    <!-- Action Bar -->
    <div class="action-bar">
      <div class="action-left">
        <button type="button" class="btn-new" (click)="onNew()">
          New
        </button>
        <div class="action-icons">
          <button type="button" class="icon-btn" (click)="onDelete()" title="Delete">
            <span class="material-symbols-outlined">delete</span>
          </button>
          <button type="button" class="icon-btn" (click)="onSave()" title="Save">
            <span class="material-symbols-outlined">save</span>
          </button>
        </div>
      </div>
      <div class="action-right">
        <div class="search-bar">
          <span class="material-symbols-outlined search-icon" aria-hidden="true">search</span>
          <input type="text" class="search-input" placeholder="Search discounts..." />
        </div>
      </div>
    </div>

    <!-- Discount Form Container -->
    <div class="form-container">
      
      <div class="title-group">
        <input type="text" class="title-input" placeholder="Discount Name" [ngModel]="discountName()" (ngModelChange)="discountName.set($event)" />
      </div>
      
      <div class="form-layout">
        <!-- Left Column -->
        <div class="form-column">
          <div class="form-group row-group">
            <label class="form-label" for="discountType">Fixed Price/ percentage</label>
            <div class="select-wrapper type-select">
              <select id="discountType" class="form-select type-select" [value]="discountType()" (change)="discountType.set($any($event.target).value)">
                @for(type of discountTypes; track type) {
                  <option [value]="type">{{ type }}</option>
                }
              </select>
            </div>
          </div>

          <div class="form-group row-group">
            <label class="form-label" for="minPurchase">Minimum purchase</label>
            <input type="number" id="minPurchase" class="form-input text-input" [ngModel]="minimumPurchase()" (ngModelChange)="minimumPurchase.set($event)" />
          </div>

          <div class="form-group row-group">
            <label class="form-label" for="minQuantity">Minimum quantity</label>
            <input type="number" id="minQuantity" class="form-input text-input" [ngModel]="minimumQuantity()" (ngModelChange)="minimumQuantity.set($event)" />
          </div>

          <div class="form-group row-group">
            <label class="form-label" for="products">Products</label>
            <input type="text" id="products" class="form-input text-input" [ngModel]="products()" (ngModelChange)="products.set($event)" />
          </div>
        </div>

        <!-- Right Column -->
        <div class="form-column">
          <div class="form-group row-group">
            <label class="form-label" for="startDate">Start Date</label>
            <input type="date" id="startDate" class="form-input text-input date-input" [ngModel]="startDate()" (ngModelChange)="startDate.set($event)" />
          </div>

          <div class="form-group row-group">
            <label class="form-label" for="endDate">End Date</label>
            <input type="date" id="endDate" class="form-input text-input date-input" [ngModel]="endDate()" (ngModelChange)="endDate.set($event)" />
          </div>

          <div class="form-group row-group limit-usage-group">
            <label class="form-label" for="limitUsage">Limit usage</label>
            <input type="checkbox" id="limitUsage" class="form-checkbox" [checked]="limitUsage()" (change)="limitUsage.set($any($event.target).checked)" />
            
            @if(limitUsage()) {
              <div class="limit-count-wrapper">
                <input type="number" class="form-input num-input inline-num" placeholder="Count" [ngModel]="limitUsageCount()" (ngModelChange)="limitUsageCount.set($event)" />
              </div>
            }
          </div>
        </div>
      </div>
    </div>

  </main>
