<main class="internal-content">

    <!-- Action Bar -->
    <div class="action-bar">
      <div class="action-left">
        <button type="button" class="btn-new" (click)="onNew()">
          New
        </button>
        <div class="action-icons">
          <button type="button" class="icon-btn" (click)="onDelete()" title="Delete">
            <span class="material-symbols-outlined">delete</span>
          </button>
          <button type="button" class="icon-btn" (click)="onSave()" title="Save">
            <span class="material-symbols-outlined">save</span>
          </button>
        </div>
      </div>
      <div class="action-right">
        <div class="search-bar">
          <span class="material-symbols-outlined search-icon" aria-hidden="true">search</span>
          <input type="text" class="search-input" placeholder="Search taxes..." />
        </div>
      </div>
    </div>

    <!-- Tax Form Container -->
    <div class="form-container">

      <!-- Tax Name — large editable title -->
      <div class="title-group">
        <input
          type="text"
          id="taxName"
          class="title-input"
          placeholder="Tax Name"
          [ngModel]="taxName()"
          (ngModelChange)="taxName.set($event)" />
      </div>

      <!-- Fields Section -->
      <div class="form-layout">

        <!-- Tax Computation Row -->
        <div class="row-group">
          <label class="form-label" for="taxComputation">Tax Computation</label>
          <select
            id="taxComputation"
            class="field-select"
            [value]="taxComputation()"
            (change)="taxComputation.set($any($event.target).value)">
            @for(type of computationTypes; track type) {
              <option [value]="type">{{ type }}</option>
            }
          </select>
        </div>

        <!-- Amount Row -->
        <div class="row-group">
          <label class="form-label" for="taxAmount">Amount</label>
          <input
            type="number"
            id="taxAmount"
            class="field-input"
            [ngModel]="amount()"
            (ngModelChange)="amount.set($event)"
            placeholder="" />
        </div>

      </div>

    </div>

  </main>
