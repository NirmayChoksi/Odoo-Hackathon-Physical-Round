<div class="internal-container">

  <!-- Navigation Header -->
  <nav class="internal-nav">
    <div class="nav-brand">
      <img src="/images/logo/subsync-logo.svg" alt="SubSync" class="brand-logo" />
    </div>
    <div class="nav-links">
      @for(item of navItems(); track item.label) {
        @if(item.isDropdown) {
          <div class="nav-dropdown" [class.nav-dropdown--open]="isConfigOpen()">
            <button type="button" class="nav-link nav-dropdown-btn" [class.nav-link--active]="item.active" (click)="toggleConfig($event)">
              {{ item.label }}
              <span class="material-symbols-outlined dropdown-icon">arrow_drop_down</span>
            </button>
            <div class="nav-dropdown-content" (click)="$event.stopPropagation()">
              @for(sub of item.dropdownItems; track sub.label) {
                <a
                  [routerLink]="sub.path"
                  class="dropdown-item"
                  routerLinkActive="dropdown-item--current"
                  [routerLinkActiveOptions]="{ exact: sub.exactActive }">
                  {{ sub.label }}
                </a>
              }
            </div>
          </div>
        } @else {
          <a [routerLink]="item.path" class="nav-link" [class.nav-link--active]="item.active" (click)="onNavClick(item)">
            {{ item.label }}
          </a>
        }
      }
    </div>
    <div class="nav-profile">
      <a routerLink="/login" class="profile-btn">
        <span class="material-symbols-outlined">person</span>
        My Profile
      </a>
    </div>
  </nav>

  <!-- Main Content Body -->
  <main class="internal-content">

    <!-- Action Bar -->
    <div class="action-bar">
      <div class="action-left">
        <button type="button" class="btn-new" (click)="onNew()">
          New
        </button>
        <div class="action-icons">
          <button type="button" class="icon-btn" (click)="onDelete()" title="Delete">
            <span class="material-symbols-outlined">delete</span>
          </button>
          <button type="button" class="icon-btn" (click)="onSave()" title="Save">
            <span class="material-symbols-outlined">save</span>
          </button>
        </div>
      </div>
      <div class="action-right">
        <div class="search-box">
          <span class="material-symbols-outlined">search</span>
          <input type="text" placeholder="Search taxes..." />
        </div>
      </div>
    </div>

    <!-- Tax Form Container -->
    <div class="form-container">

      <!-- Tax Name — large editable title -->
      <div class="title-group">
        <input
          type="text"
          id="taxName"
          class="title-input"
          placeholder="Tax Name"
          [ngModel]="taxName()"
          (ngModelChange)="taxName.set($event)" />
      </div>

      <!-- Fields Section -->
      <div class="fields-section">

        <!-- Tax Computation Row -->
        <div class="field-row">
          <label class="field-label" for="taxComputation">Tax Computation</label>
          <select
            id="taxComputation"
            class="field-select"
            [value]="taxComputation()"
            (change)="taxComputation.set($any($event.target).value)">
            @for(type of computationTypes; track type) {
              <option [value]="type">{{ type }}</option>
            }
          </select>
        </div>

        <!-- Amount Row -->
        <div class="field-row">
          <label class="field-label" for="taxAmount">Amount</label>
          <input
            type="number"
            id="taxAmount"
            class="field-input"
            [ngModel]="amount()"
            (ngModelChange)="amount.set($event)"
            placeholder="" />
        </div>

      </div>

    </div>

  </main>
</div>
