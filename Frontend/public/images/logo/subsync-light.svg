  <!-- Icon background -->
  <rect x="12" y="12" width="56" height="56" rx="14" fill="#03122F"/>

  <!-- Refresh arc -->
  <path d="M40 22 A16 16 0 1 1 25 42" fill="none" stroke="#AE7DAC" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Arrow tip -->
