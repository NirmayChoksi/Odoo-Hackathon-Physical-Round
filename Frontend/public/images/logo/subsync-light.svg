  <!-- Bill lines -->
  <line x1="44" y1="31" x2="58" y2="31" stroke="#F3DADF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44" y1="40" x2="60" y2="40" stroke="#F3DADF" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="44" y1="49" x2="55" y2="49" stroke="#F3DADF" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <!-- Sub -->
  <text x="82" y="42"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="700"
    fill="#03122F"
